<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ 必買清單 | 熱海長瀞之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="nav-sticky">
        <div id="nav-container" class="nav-container"></div>
    </nav>

    <header class="hero hero-shopping">
        <div class="hero-content">
            <span class="hero-badge">Shopping List</span>
            <h1>🛍️ 我的購物採購清單</h1>
            <p class="hero-subtitle">記錄下在日本想買的所有清單，滿載而歸！</p>
        </div>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="section-header">
                <h2>🛍️ 日本必買購物清單</h2>
                <p>自動儲存，不怕遺忘的採購筆記</p>
            </div>
            <div class="shopping-container">
                <div class="input-group">
                    <input type="text" id="itemInput" class="shopping-input" placeholder="輸入想買的東西... (例如: EVE止痛藥)">
                    <button id="addBtn" class="btn-add">加入</button>
                </div>
                <div class="category-tags" id="quickAddTags"></div>
                <ul id="shoppingList" class="shopping-list"></ul>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>📍 行程相關購物推薦</h2>
                <p>根據您的 6 天行程整理的購物熱點</p>
            </div>
            <div class="events-grid">
                <div class="event-card">
                    <h3>Day 1: 熱海商圈</h3>
                    <p>平和通與仲見世通商店街</p>
                    <div class="tag-row">
                        <button type="button" class="category-tag" data-add-item="溫泉饅頭">+ 溫泉饅頭</button>
                        <button type="button" class="category-tag" data-add-item="熱海布丁">+ 熱海布丁</button>
                    </div>
                </div>
                <div class="event-card">
                    <h3>Day 2: 伊東漁港</h3>
                    <p>在地海產與乾貨</p>
                    <div class="tag-row">
                        <button type="button" class="category-tag" data-add-item="伊勢龍蝦乾貨">+ 伊勢龍蝦乾貨</button>
                        <button type="button" class="category-tag" data-add-item="在地海產拌手禮">+ 在地海產拌手禮</button>
                    </div>
                </div>
                <div class="event-card">
                    <h3>Day 5: 秩父特產</h3>
                    <p>傳統工藝與清酒</p>
                    <div class="tag-row">
                        <button type="button" class="category-tag" data-add-item="秩父錦日本酒">+ 秩父錦日本酒</button>
                        <button type="button" class="category-tag" data-add-item="秩父味噌">+ 秩父味噌</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-wish">🛒 祝您購物愉快，滿載而歸！</p>
        </div>
    </footer>

    <script type="module" src="/js/shopping.js"></script>
</body>
</html>
