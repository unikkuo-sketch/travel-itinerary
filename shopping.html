<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ 購物清單</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="nav-sticky">
        <div id="nav-container" class="nav-container"></div>
    </nav>

    <header class="hero hero-shopping">
        <div class="hero-content">
            <span class="hero-badge">Shopping List</span>
            <h1 id="shopping-trip-title">🛍️ 購物採購清單</h1>
            <p class="hero-subtitle">自動儲存，不怕遺忘的採購筆記</p>
        </div>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="section-header">
                <h2>🛍️ 必買清單</h2>
                <p>點擊快速標籤或自行輸入</p>
            </div>
            <div class="shopping-container">
                <div class="input-group">
                    <input type="text" id="itemInput" class="shopping-input" placeholder="輸入想買的東西...">
                    <button id="addBtn" class="btn-add">加入</button>
                </div>
                <div class="category-tags" id="quickAddTags"></div>
                <ul id="shoppingList" class="shopping-list"></ul>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>📍 行程相關購物推薦</h2>
            </div>
            <div id="shopping-rec-root" class="events-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-wish">🛒 祝您購物愉快，滿載而歸！</p>
        </div>
    </footer>

    <script type="module" src="/js/shopping.js"></script>
</body>
</html>
