<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ 必買清單 | 熱海長瀞之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-sticky">
        <div class="nav-container">
            <a href="index.html" class="nav-link">🏠 首頁</a>
            <a href="index.html#tickets" class="nav-link">🎫 票券</a>
            <a href="index.html#overview" class="nav-link">📋 總覽</a>
            <a href="index.html#day1" class="nav-link">Day 1</a>
            <a href="index.html#day2" class="nav-link">Day 2</a>
            <a href="index.html#day3" class="nav-link">Day 3</a>
            <a href="index.html#day4" class="nav-link">Day 4</a>
            <a href="index.html#day5" class="nav-link">Day 5</a>
            <a href="index.html#day6" class="nav-link">Day 6</a>
            <span class="nav-link active">🛍️ 購物</span>
        </div>
    </nav>
    <header class="hero" style="min-height: 40vh; background: var(--gradient-spring);">
        <div class="hero-content">
            <span class="hero-badge">Shopping List</span>
            <h1>🛍️ 我的購物採購清單</h1>
            <p class="hero-subtitle">記錄下在日本想買的所有清單，滿載而歸！</p>
        </div>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="section-header">
                <h2>🛍️ 日本必買購物清單</h2>
                <p>自動儲存，不怕遺忘的採購筆記</p>
            </div>

            <div class="shopping-container">
                <div class="input-group">
                    <input type="text" id="itemInput" class="shopping-input" placeholder="輸入想買的東西... (例如: EVE止痛藥)">
                    <button id="addBtn" class="btn-add">加入</button>
                </div>

                <div class="category-tags" id="quickAddTags">
                    <!-- JS will populate this -->
                </div>

                <ul id="shoppingList" class="shopping-list">
                    <!-- JS will populate this -->
                </ul>
            </div>
        </section>
        <section class="section">
            <div class="section-header">
                <h2>📍 行程相關購物推薦</h2>
                <p>根據您的 6 天行程整理的購物熱點</p>
            </div>
            <div class="events-grid">
                <div class="event-card">
                    <h3>Day 1: 熱海商圈</h3>
                    <p>平和通與仲見世通商店街</p>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                        <button class="category-tag" onclick="addItem('溫泉饅頭')">+ 溫泉饅頭</button>
                        <button class="category-tag" onclick="addItem('熱海布丁')">+ 熱海布丁</button>
                    </div>
                </div>
                <div class="event-card">
                    <h3>Day 2: 伊東漁港</h3>
                    <p>在地海產與乾貨</p>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                        <button class="category-tag" onclick="addItem('伊勢龍蝦乾貨')">+ 伊勢龍蝦乾貨</button>
                        <button class="category-tag" onclick="addItem('在地海產拌手禮')">+ 在地海產拌手禮</button>
                    </div>
                </div>
                <div class="event-card">
                    <h3>Day 5: 秩父特產</h3>
                    <p>傳統工藝與清酒</p>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                        <button class="category-tag" onclick="addItem('秩父錦日本酒')">+ 秩父錦日本酒</button>
                        <button class="category-tag" onclick="addItem('秩父味噌')">+ 秩父味噌</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-wish">🛒 祝您購物愉快，滿載而歸！</p>
        </div>
    </footer>

    <script>
        // Default suggestions
        const suggestions = [
            "EVE止痛藥", "合利他命", "Wakamoto", "DHC護唇膏", 
            "蒸氣眼罩", "休足時間", "熱海布丁", "溫泉饅頭", 
            "秩父味噌", "秩父錦日本酒"
        ];

        // Load from LocalStorage
        let items = JSON.parse(localStorage.getItem('travelShoppingList')) || [];

        // If empty first time, maybe populate default? (Optional, let's keep it clean or use quick tags)
        
        const listEl = document.getElementById('shoppingList');
        const inputEl = document.getElementById('itemInput');
        const addBtn = document.getElementById('addBtn');
        const tagsContainer = document.getElementById('quickAddTags');

        // Render Quick Tags
        suggestions.forEach(item => {
            const tag = document.createElement('div');
            tag.className = 'category-tag';
            tag.textContent = `+ ${item}`;
            tag.onclick = () => addItem(item);
            tagsContainer.appendChild(tag);
        });

        function renderList() {
            listEl.innerHTML = '';
            if (items.length === 0) {
                listEl.innerHTML = '<div class="empty-state">購物車空空的，快去加點東西吧！🛒</div>';
                return;
            }

            items.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `shopping-item ${item.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input type="checkbox" class="item-checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem(${index})">
                    <span class="item-text">${item.text}</span>
                    <button class="btn-delete" onclick="deleteItem(${index})">🗑️</button>
                `;
                listEl.appendChild(li);
            });
            save();
        }

        function addItem(text) {
            if (!text) text = inputEl.value.trim();
            if (text) {
                items.unshift({ text, completed: false });
                inputEl.value = '';
                renderList();
            }
        }

        function toggleItem(index) {
            items[index].completed = !items[index].completed;
            renderList();
        }

        function deleteItem(index) {
            if(confirm('確定要刪除嗎？')) {
                items.splice(index, 1);
                renderList();
            }
        }

        function save() {
            localStorage.setItem('travelShoppingList', JSON.stringify(items));
        }

        addBtn.addEventListener('click', () => addItem());
        inputEl.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') addItem();
        });

        // Initial Render
        renderList();
    </script>
</body>
</html>
