<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ 購物清單</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/travel-itinerary-2026/assets/shopping-CjeDYk3z.js"></script>
  <link rel="modulepreload" crossorigin href="/travel-itinerary-2026/assets/load-trip-BWbivutX.js">
  <link rel="modulepreload" crossorigin href="/travel-itinerary-2026/assets/nav-B1O7s3M6.js">
  <link rel="stylesheet" crossorigin href="/travel-itinerary-2026/assets/load-trip-BrROYpij.css">
</head>
<body>
    <nav class="nav-sticky">
        <div id="nav-container" class="nav-container"></div>
    </nav>

    <header class="hero hero-shopping">
        <div class="hero-content">
            <span class="hero-badge">Shopping List</span>
            <h1 id="shopping-trip-title">🛍️ 購物採購清單</h1>
            <p class="hero-subtitle">參考推薦、建立自己的採購清單</p>
        </div>
    </header>

    <main class="main-content">
        <section id="shopping-zone-mine" class="section shopping-zone shopping-zone--mine">
            <div class="section-header">
                <h2>📝 我的待買清單</h2>
                <p>自行輸入或從下方伴手禮推薦點擊加入 · 自動儲存於此裝置</p>
            </div>
            <div class="shopping-container">
                <div class="input-group">
                    <input type="text" id="itemInput" class="shopping-input" placeholder="輸入想買的東西...">
                    <button id="addBtn" class="btn-add">加入</button>
                </div>
                <ul id="shoppingList" class="shopping-list"></ul>
            </div>
        </section>

        <section class="section shopping-zone shopping-zone--trip">
            <div class="section-header">
                <h2>📍 行程伴手禮推薦</h2>
                <p>依本趟景點整理的在地特產</p>
                <p class="shopping-price-disclaimer">價格為出發前網路／藥妝店常見參考，非即時報價</p>
            </div>
            <div id="shopping-rec-root" class="shopping-trip-root"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-wish">🛒 祝您購物愉快，滿載而歸！</p>
        </div>
    </footer>

</body>
</html>
